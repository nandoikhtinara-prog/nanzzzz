<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Rahasia</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        textarea { width: 100%; height: 150px; background: #222; border: 1px solid #444; border-radius: 10px; color: white; padding: 15px; margin: 15px 0; resize: none; outline: none; }
        button { width: 100%; padding: 15px; background: white; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #555; cursor: not-allowed; }
        .status { margin-top: 10px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Kirim Pesan Rahasia</h1>
        <p>Identitasmu tetap aman dan anonim.</p>
        
        <form id="pesanForm">
            <textarea id="isiPesan" name="Pesan" placeholder="Tulis pesanmu di sini..." required></textarea>
            <button type="submit" id="btnKirim">KIRIM SEKARANG</button>
        </form>
        <div id="notif" class="status"></div>
    </div>

    <script>
        const form = document.getElementById('pesanForm');
        const btn = document.getElementById('btnKirim');
        const notif = document.getElementById('notif');

        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Mencegah pindah halaman ke FormSubmit
            
            btn.disabled = true;
            btn.innerText = "MENGIRIM...";

            const formData = new FormData(form);

            fetch("https://formsubmit.co/ajax/Nandoikhtinara@gmail.com", {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            })
            .then(response => {
                if (response.ok) {
                    alert("Berhasil! Pesan rahasiamu sudah terkirim.");
                    form.reset();
                } else {
                    alert("Gagal mengirim pesan.");
                }
            })
            .catch(error => {
                alert("Terjadi kesalahan koneksi.");
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = "KIRIM SEKARANG";
            });
        });
    </script>

</body>
</html>
