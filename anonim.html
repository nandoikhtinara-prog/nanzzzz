<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Rahasia</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; background: #222; border: 1px solid #444; border-radius: 10px; color: white; padding: 15px; margin-bottom: 15px; resize: none; outline: none; }
        button { width: 100%; padding: 15px; background: white; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Kirim Pesan Rahasia</h1>
        <p>Tulis pesanmu, identitasmu tetap rahasia.</p>

        <form action="https://formsubmit.co/KODE_ID_ALIAS_KAMU" method="POST">
            
            <input type="hidden" name="_captcha" value="false">
            
            <input type="hidden" name="_next" value="https://nandoikhtinara-prog.github.io/nanzzzz/anonim.html">

            <input type="hidden" name="_subject" value="Ada Pesan Anonim Baru!">

            <textarea name="Isi_Pesan" placeholder="Ketik di sini..." required></textarea>
            
            <button type="submit">KIRIM SEKARANG</button>
        </form>
    </div>

</body>
</html>
