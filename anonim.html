<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Rahasia</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        textarea { width: 100%; height: 160px; background: #1a1a1a; border: 1px solid #333; border-radius: 12px; color: white; padding: 15px; margin-bottom: 15px; resize: none; outline: none; font-size: 1rem; }
        button { width: 100%; padding: 15px; background: white; color: black; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Kirim Pesan Rahasia</h1>
        <p>Aman & 100% Anonim. Identitasmu tidak akan terlihat.</p>

        <form action="https://formsubmit.co/MASUKKAN_KODE_ID_DI_SINI" method="POST">
            
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_next" value="https://nandoikhtinara-prog.github.io/nanzzzz/anonim.html">

            <textarea name="Pesan" placeholder="Ketik pesanmu..." required></textarea>
            
            <button type="submit">KIRIM SEKARANG</button>
        </form>
    </div>

</body>
</html>
