<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Rahasia</title>
    <style>
        body { background: #000; color: white; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; background: #111; padding: 40px 20px; border-radius: 25px; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 1.6rem; margin-bottom: 10px; }
        p { color: #888; font-size: 0.9rem; margin-bottom: 25px; }
        textarea { width: 100%; height: 160px; background: #1a1a1a; border: 1px solid #444; border-radius: 15px; color: white; padding: 15px; margin-bottom: 20px; resize: none; outline: none; font-size: 1rem; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; background: white; color: black; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; display: inline-block; text-decoration: none; font-size: 1rem; transition: 0.3s; }
        
        /* CSS untuk perpindahan halaman otomatis */
        .halaman-sukses { display: none; }
        #thanks:target .halaman-sukses { display: block; }
        #thanks:target .halaman-form { display: none; }
    </style>
</head>
<body id="thanks">

    <div class="card">
        <div class="halaman-form">
            <h1>Kirim Pesan Rahasia</h1>
            <p>Identitasmu 100% aman & anonim.</p>
            
            <form action="https://formsubmit.co/Nandoikhtinara@gmail.com" method="POST">
                <input type="hidden" name="_captcha" value="false">
                
                <input type="hidden" name="_next" value="https://nandoikhtinara-prog.github.io/nanzzzz/anonim.html#thanks">

                <textarea name="Pesan" placeholder="Tulis pesan rahasia di sini..." required></textarea>
                <button type="submit" class="btn">KIRIM SEKARANG</button>
            </form>
        </div>

        <div class="halaman-sukses">
            <h1 style="font-size: 3.5rem; margin-bottom: 10px;">ありがとう</h1>
            <p style="color: #888; margin-bottom: 40px;">Pesanmu sudah terkirim secara rahasia.</p>
            <a href="https://google.com" class="btn">KELUAR</a>
        </div>
    </div>

</body>
</html>
