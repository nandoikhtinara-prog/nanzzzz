<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Mandarin - 做自己的光</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #1a1a2e 0%, #020205 100%);
            color: white;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            justify-content: center;
        }

        .lyric-window {
            height: 450px;
            width: 100%;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
        }

        #lyric-list {
            position: absolute;
            width: 100%;
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .lyric-line {
            padding: 25px 0;
            transition: all 0.5s ease;
            opacity: 0.1;
            filter: blur(1px);
        }

        /* Hanzi di ATAS (Besar) */
        .hanzi {
            display: block;
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        /* Latin/Pinyin di BAWAH (Kecil) */
        .latin {
            display: block;
            font-size: 1rem;
            letter-spacing: 1px;
            text-transform: lowercase;
            opacity: 0.7;
        }

        /* Style saat lirik aktif */
        .lyric-line.active {
            opacity: 1;
            filter: blur(0);
            transform: scale(1.1);
        }

        .active .hanzi {
            color: #00f2fe;
            text-shadow: 0 0 25px rgba(0, 242, 254, 0.7);
        }

        .active .latin {
            color: #fff;
            opacity: 1;
        }

        .player-area {
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            display: flex;
            justify-content: center;
            border-top: 1px solid #333;
        }

        audio {
            width: 85%;
            filter: invert(1) hue-rotate(180deg);
        }
    </style>
</head>
<body>

    <div class="lyric-window">
        <div id="lyric-list">
            </div>
    </div>

    <div class="player-area">
        <audio id="audio" controls>
            <source src="2174439633541359863-c.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // Data Lirik: [Detik, Mandarin, Latin/Pinyin]
        const lyricData = [
            [0.1, "不需要太阳", "bù xū yào tài yáng"],
            [2.8, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [7.0, "妈妈说要快乐", "mā ma shuō yào kuài lè"],
            [10.5, "全没告诉我方法", "quán méi gào sù wǒ fāng fǎ"],
            [13.8, "成长的小鬼为我", "chéng zhǎng de xiǎo guǐ wéi wǒ"],
            [17.2, "时代是学不可怕", "shì dài shì xué bù kě pà"],
            [20.5, "可怕的是里还相信这句话", "kě pà de shì lǐ hái xiāng xìn zhè jù huà"],
            [24.8, "做自己的光", "zuò zì jǐ de guāng"],
            [28.2, "不需要太亮", "bù xū yào tài liàng"],
            [31.5, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [35.2, "孤独的路上", "gū dú de lù shàng"],
            [38.5, "还要走很长", "hái yào zǒu hěn cháng"],
            [42.0, "成长来自不曾放弃的每一步", "chéng zhǎng lái zì bù céng fàng qì de méi mù"],
            [46.5, "做自己的光", "zuò zì jǐ de guāng"]
        ];

        const list = document.getElementById('lyric-list');
        const audio = document.getElementById('audio');

        // Render lirik ke layar
        lyricData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.id = `line-${index}`;
            div.innerHTML = `<span class="hanzi">${item[1]}</span><span class="latin">${item[2]}</span>`;
            list.appendChild(div);
        });

        audio.addEventListener('timeupdate', () => {
            const currentTime = audio.currentTime;
            
            for (let i = 0; i < lyricData.length; i++) {
                if (currentTime >= lyricData[i][0] && (!lyricData[i+1] || currentTime < lyricData[i+1][0])) {
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                    const activeLine = document.getElementById(`line-${i}`);
                    activeLine.classList.add('active');

                    // Posisi scroll otomatis ke tengah
                    const containerHeight = document.querySelector('.lyric-window').offsetHeight;
                    const offset = (containerHeight / 2) - activeLine.offsetTop - (activeLine.offsetHeight / 2);
                    list.style.transform = `translateY(${offset}px)`;
                }
            }
        });
    </script>
</body>
</html>
