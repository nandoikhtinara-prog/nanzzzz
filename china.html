<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Mode - 做自己的光</title>
    <style>
        :root {
            --primary-color: #00d2ff;
            --bg-dark: #0f0c29;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: white;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            margin-top: 30px;
            text-align: center;
        }

        .lyric-container {
            flex: 1;
            width: 90%;
            max-width: 600px;
            overflow-y: hidden;
            margin: 40px 0;
            position: relative;
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
        }

        #lyric-list {
            position: absolute;
            width: 100%;
            top: 50%;
            transition: transform 0.4s ease-out;
            text-align: center;
        }

        .lyric-line {
            padding: 15px 0;
            font-size: 1.2rem;
            opacity: 0.3;
            transition: all 0.3s;
        }

        .lyric-line.active {
            opacity: 1;
            font-size: 1.8rem;
            color: var(--primary-color);
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
        }

        .pinyin {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 5px;
            opacity: 0.7;
        }

        .player-box {
            background: rgba(255, 255, 255, 0.05);
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        audio {
            width: 80%;
            filter: invert(1);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin-bottom: 5px;">做自己的光</h1>
        <p style="opacity: 0.6;">Be Your Own Light</p>
    </div>

    <div class="lyric-container">
        <div id="lyric-list">
            </div>
    </div>

    <div class="player-box">
        <audio id="audio" controls>
            <source src="2174439633541359863-c.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // Data Lirik: [Detik, Pinyin, Mandarin]
        const lyricData = [
            [0, "Music", "--- Intro ---"],
            [2, "bù xū yào tài yáng", "不需要太阳"],
            [5, "shéi shuō yào nì fēng cái suàn fēi xiáng", "谁说要逆风才算飞翔"],
            [10, "gū dú de lù shàng", "孤独的路上"],
            [13, "hái yào zǒu hěn cháng", "还要走很长"],
            [16, "chéng zhǎng ràng zì zūn zài méi yǒu piān fāng", "成长让自尊再没有偏方"],
            [21, "zuò zì jǐ de guāng", "做自己的光"],
            [24, "bù xū yào tài liàng", "不需要太亮"],
            [27, "shéi shuō yào nì fēng cái suàn fēi xiáng", "谁说要逆风才算飞翔"],
            [31, "gū dú de lù shàng", "孤独的路上"],
            [34, "hái yào zǒu hěn cháng", "还要走很长"],
            [37, "chéng zhǎng lái zì bù céng fàng qì de méi mù", "成长来自不曾放弃的每一步"],
            [42, "zuò zì jǐ de guāng", "做自己的光"]
        ];

        const lyricList = document.getElementById('lyric-list');
        const audio = document.getElementById('audio');

        // Render lirik ke layar
        lyricData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.id = `line-${index}`;
            div.innerHTML = `<span class="pinyin">${item[1]}</span>${item[2]}`;
            lyricList.appendChild(div);
        });

        audio.addEventListener('timeupdate', () => {
            const currentTime = audio.currentTime;
            
            for (let i = 0; i < lyricData.length; i++) {
                if (currentTime >= lyricData[i][0] && (!lyricData[i+1] || currentTime < lyricData[i+1][0])) {
                    // Highlight lirik aktif
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                    const currentLine = document.getElementById(`line-${i}`);
                    currentLine.classList.add('active');
                    
                    // Geser list agar lirik aktif di tengah
                    const offset = -(i * 70); // 70px adalah perkiraan tinggi per baris
                    lyricList.style.transform = `translateY(${offset}px)`;
                }
            }
        });
    </script>
</body>
</html>
