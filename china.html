<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke - 做自己的光</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            color: white;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .lyric-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
        }

        #lyric-list {
            transition: transform 0.3s ease-out;
            text-align: center;
        }

        .lyric-line {
            padding: 20px 0;
            font-size: 1.4rem;
            opacity: 0.2;
            transition: all 0.4s;
        }

        .lyric-line.active {
            opacity: 1;
            font-size: 2.2rem;
            color: #ffcc00; /* Warna emas agar seperti cahaya */
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.6);
        }

        .pinyin {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            opacity: 0.6;
        }

        .player-box {
            background: #111;
            width: 100%;
            padding: 30px;
            text-align: center;
            border-top: 1px solid #333;
        }

        audio {
            width: 80%;
            filter: invert(1);
        }
    </style>
</head>
<body>

    <div class="lyric-container">
        <div id="lyric-list">
            </div>
    </div>

    <div class="player-box">
        <audio id="audio" controls>
            <source src="2174439633541359863-c.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const lyricData = [
            [0.5, "bù xū yào tài yáng", "不需要太阳"],
            [3.2, "shéi shuō yào nì fēng cái suàn fēi xiáng", "谁说要逆风才算飞翔"],
            [7.5, "mā ma shuō yào kuài lè", "妈妈说要快乐"],
            [10.8, "quán méi gào sù wǒ fāng fǎ", "全没告诉我方法"],
            [14.2, "chéng zhǎng de xiǎo guǐ wéi wǒ", "成长的小鬼为我"],
            [17.5, "shì dài shì xué bù kě pà", "时代是学不可怕"],
            [20.8, "kě pà de shì lǐ hái xiāng xìn zhè jù huà", "可怕的是里还相信这句话"],
            [25.0, "zuò zì jǐ de guāng", "做自己的光"],
            [28.5, "bù xū yào tài liàng", "不需要太亮"],
            [31.8, "shéi shuō yào nì fēng cái suàn fēi xiáng", "谁说要逆风才算飞翔"],
            [35.5, "gū dú de lù shàng", "孤独的路上"],
            [38.8, "hái yào zǒu hěn cháng", "还要走很长"],
            [42.2, "chéng zhǎng lái zì bù céng fàng qì de méi mù", "成长来自不曾放弃的每一步"],
            [46.5, "zuò zì jǐ de guāng", "做自己的光"]
        ];

        const lyricList = document.getElementById('lyric-list');
        const audio = document.getElementById('audio');

        // Render lirik
        lyricData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.id = `line-${index}`;
            div.innerHTML = `<span class="pinyin">${item[1]}</span>${item[2]}`;
            lyricList.appendChild(div);
        });

        audio.addEventListener('timeupdate', () => {
            const currentTime = audio.currentTime;
            
            for (let i = 0; i < lyricData.length; i++) {
                if (currentTime >= lyricData[i][0] && (!lyricData[i+1] || currentTime < lyricData[i+1][0])) {
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                    const currentLine = document.getElementById(`line-${i}`);
                    if(currentLine) {
                        currentLine.classList.add('active');
                        const containerHeight = document.querySelector('.lyric-container').offsetHeight;
                        const lineOffset = currentLine.offsetTop;
                        // Menjaga lirik tetap di tengah secara vertikal
                        lyricList.style.transform = `translateY(${(containerHeight/2) - lineOffset - 40}px)`;
                    }
                }
            }
        });
    </script>
</body>
</html>
