<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>做自己的光 - Karaoke</title>
    <style>
        body {
            margin: 0;
            background: #0f0c29;
            background: linear-gradient(to bottom, #000000, #0f0c29);
            color: white;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Bagian Judul */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: 5px;
        }

        .header p {
            font-size: 1rem;
            opacity: 0.6;
            margin: 5px 0 0;
        }

        /* Jendela Lirik */
        .lyric-window {
            flex: 1;
            overflow: hidden;
            position: relative;
            mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
        }

        #lyric-list {
            position: absolute;
            width: 100%;
            text-align: center;
            transition: transform 0.4s ease-out;
        }

        .lyric-line {
            padding: 25px 0;
            opacity: 0.2;
            transition: all 0.4s ease;
        }

        /* Mandarin di ATAS, Latin di BAWAH */
        .hanzi {
            display: block;
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .latin {
            display: block;
            font-size: 1rem;
            opacity: 0.7;
        }

        /* Style saat lirik menyala */
        .lyric-line.active {
            opacity: 1;
            transform: scale(1.05);
        }

        .active .hanzi {
            color: #00d2ff;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.8);
        }

        /* Player di bawah */
        .controls {
            padding: 30px;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
        }

        audio {
            width: 90%;
            filter: invert(1);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>做自己的光</h1>
        <p>Be Your Own Light</p>
    </div>

    <div class="lyric-window">
        <div id="lyric-list">
            </div>
    </div>

    <div class="controls">
        <audio id="audio" controls>
            <source src="2174439633541359863-c.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        // Data lirik tanpa intro [Detik, Mandarin, Latin]
        const lyricData = [
            [0.1, "不需要太阳", "bù xū yào tài yáng"],
            [3.2, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [7.5, "妈妈说要快乐", "mā ma shuō yào kuài lè"],
            [10.8, "全没告诉我方法", "quán méi gào sù wǒ fāng fǎ"],
            [14.2, "成长的小鬼为我", "chéng zhǎng de xiǎo guǐ wéi wǒ"],
            [17.5, "时代是学不可怕", "shì dài shì xué bù kě pà"],
            [21.0, "可怕的是里还相信这句话", "kě pà de shì lǐ hái xiāng xìn zhè jù huà"],
            [25.2, "做自己的光", "zuò zì jǐ de guāng"],
            [28.8, "不需要太亮", "bù xū yào tài liàng"],
            [32.0, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [35.8, "孤独的路上", "gū dú de lù shàng"],
            [39.0, "还要 walk 很长", "hái yào zǒu hěn cháng"],
            [42.5, "成长来自不曾放弃的每一步", "chéng zhǎng lái zì bù céng fàng qì de méi mù"],
            [47.0, "做自己的光", "zuò zì jǐ de guāng"]
        ];

        const list = document.getElementById('lyric-list');
        const audio = document.getElementById('audio');

        // Render lirik
        lyricData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.id = `line-${index}`;
            div.innerHTML = `<span class="hanzi">${item[1]}</span><span class="latin">${item[2]}</span>`;
            list.appendChild(div);
        });

        audio.addEventListener('timeupdate', () => {
            const time = audio.currentTime;
            for (let i = 0; i < lyricData.length; i++) {
                if (time >= lyricData[i][0] && (!lyricData[i+1] || time < lyricData[i+1][0])) {
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                    const activeLine = document.getElementById(`line-${i}`);
                    activeLine.classList.add('active');

                    // Scroll otomatis ke tengah
                    const winHeight = document.querySelector('.lyric-window').offsetHeight;
                    const offset = (winHeight / 2) - activeLine.offsetTop - (activeLine.offsetHeight / 2);
                    list.style.transform = `translateY(${offset}px)`;
                }
            }
        });
    </script>
</body>
</html>
