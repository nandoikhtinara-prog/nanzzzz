<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Karaoke - 做自己的光</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'STHeiti', 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            justify-content: center;
            align-items: center;
        }

        /* Layar Awal */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .play-button {
            padding: 20px 40px;
            font-size: 20px;
            background: #00d2ff;
            border: none;
            border-radius: 50px;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        /* Container Lirik */
        .lyric-box {
            width: 100%;
            height: 60vh;
            position: relative;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
        }

        #lyric-list {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            transition: transform 0.2s linear;
        }

        .line {
            padding: 25px 10px;
            opacity: 0.1;
            transition: all 0.2s;
        }

        .active {
            opacity: 1;
            transform: scale(1.15);
            color: #00d2ff;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.8);
        }

        .hanzi { display: block; font-size: 2.5rem; font-weight: bold; margin-bottom: 5px; }
        .pinyin { display: block; font-size: 1rem; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="play-button" onclick="playSong()">MULAI LAGU</button>
    </div>

    <div class="lyric-box">
        <div id="lyric-list"></div>
    </div>

    <audio id="audio">
        <source src="2174439633541359863-c.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('audio');
        const list = document.getElementById('lyric-list');
        const overlay = document.getElementById('start-overlay');

        // Waktu di-adjust agar pas dengan vokal di file mp3
        const lyrics = [
            [0.1, "不需要太阳", "bù xū yào tài yáng"],
            [1.2, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [5.0, "妈妈说要快乐", "mā ma shuō yào kuài lè"],
            [8.2, "全没告诉我方法", "quán méi gào sù wǒ fāng fǎ"],
            [11.5, "成长的小鬼为我", "chéng zhǎng de xiǎo guǐ wéi wǒ"],
            [14.8, "时代是学不可怕", "shì dài shì xué bù kě pà"],
            [18.2, "可怕的是里还相信这句话", "kě pà de shì lǐ hái xiāng xìn zhè jù huà"],
            [22.5, "做自己的光", "zuò zì jǐ de guāng"],
            [26.0, "不需要太亮", "bù xū yào tài liàng"],
            [29.2, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [32.8, "孤独的路上", "gū dú de lù shàng"],
            [36.0, "还要走很长", "hái yào zǒu hěn cháng"],
            [39.2, "成长来自不曾放弃的每一步", "chéng zhǎng lái zì bù céng fàng qì de méi mù"],
            [44.0, "做自己的光", "zuò zì jǐ de guāng"]
        ];

        // Tampilkan lirik
        lyrics.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'line';
            div.id = `l-${i}`;
            div.innerHTML = `<span class="hanzi">${item[1]}</span><span class="pinyin">${item[2]}</span>`;
            list.appendChild(div);
        });

        function playSong() {
            overlay.style.display = 'none';
            audio.play();
        }

        audio.addEventListener('timeupdate', () => {
            const now = audio.currentTime;
            for (let i = 0; i < lyrics.length; i++) {
                if (now >= lyrics[i][0] && (!lyrics[i+1] || now < lyrics[i+1][0])) {
                    document.querySelectorAll('.line').forEach(el => el.classList.remove('active'));
                    const activeLine = document.getElementById(`l-${i}`);
                    activeLine.classList.add('active');
                    
                    const offset = -activeLine.offsetTop;
                    list.style.transform = `translateY(${offset}px)`;
                }
            }
        });
    </script>
</body>
</html>
