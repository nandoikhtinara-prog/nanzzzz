<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>做自己的光 - Center Play Button</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(180deg, #6dd5ed 0%, #2193b0 100%);
            color: #fff;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            justify-content: center;
            align-items: center;
        }

        /* Tombol Play Besar di Tengah */
        #play-btn {
            position: absolute;
            z-index: 999;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            transition: transform 0.2s, opacity 0.3s;
        }

        #play-btn:active { transform: scale(0.9); }

        #play-btn svg {
            fill: #2193b0;
            width: 50px;
            height: 50px;
        }

        /* Lirik Wrapper */
        .lyric-wrapper {
            width: 100%;
            height: 80vh;
            position: relative;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
            display: none; /* Sembunyi sebelum tombol ditekan */
        }

        #lyric-list {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            transition: transform 0.4s ease-out;
        }

        .lyric-line {
            padding: 25px 10px;
            opacity: 0.2;
            transition: all 0.4s ease;
        }

        .hanzi {
            display: block;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .latin {
            display: block;
            font-size: 1.1rem;
        }

        .lyric-line.active {
            opacity: 1;
            transform: scale(1.1);
        }

        .active .hanzi {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

    <button id="play-btn" onclick="startMusic()">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <div class="lyric-wrapper" id="wrapper">
        <div id="lyric-list"></div>
    </div>

    <audio id="audio">
        <source src="2174439633541359863-c.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play-btn');
        const wrapper = document.getElementById('wrapper');
        const list = document.getElementById('lyric-list');

        const lyricData = [
            [0.1, "不需要太阳", "bù xū yào tài yáng"],
            [2.2, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [6.1, "妈妈说要快乐", "mā ma shuō yào kuài lè"],
            [9.4, "全没告诉我方法", "quán méi gào sù wǒ fāng fǎ"],
            [12.8, "成长的小鬼为我", "chéng zhǎng de xiǎo guǐ wéi wǒ"],
            [16.1, "时代是学不可怕", "shì dài shì xué bù kě pà"],
            [19.5, "可怕的是里还相信这句话", "kě pà de shì lǐ hái xiāng xìn zhè jù huà"],
            [23.8, "做自己的光", "zuò zì jǐ de guāng"],
            [27.4, "不需要太亮", "bù xū yào tài liàng"],
            [30.6, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [34.3, "孤独的路上", "gū dú de lù shàng"],
            [37.6, "还要走很长", "hái yào zǒu hěn cháng"],
            [40.8, "成长来自不曾放弃的每一步", "chéng zhǎng lái zì bù céng fàng qì de méi mù"],
            [45.3, "做自己的光", "zuò zì jǐ de guāng"]
        ];

        // Fungsi saat tombol ditekan
        function startMusic() {
            playBtn.style.display = 'none'; // Tombol hilang
            wrapper.style.display = 'block'; // Lirik muncul
            audio.play(); // Musik mulai
        }

        // Render lirik
        lyricData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.id = `line-${index}`;
            div.innerHTML = `<span class="hanzi">${item[1]}</span><span class="latin">${item[2]}</span>`;
            list.appendChild(div);
        });

        audio.addEventListener('timeupdate', () => {
            const time = audio.currentTime;
            for (let i = 0; i < lyricData.length; i++) {
                if (time >= lyricData[i][0] && (!lyricData[i+1] || time < lyricData[i+1][0])) {
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                    const activeLine = document.getElementById(`line-${i}`);
                    if(activeLine) {
                        activeLine.classList.add('active');
                        const offset = -activeLine.offsetTop; 
                        list.style.transform = `translateY(${offset}px)`;
                    }
                }
            }
        });
    </script>
</body>
</html>
