<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Sync Karaoke - 做自己的光</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            color: white;
        }

        #play-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .btn-start {
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: #ff5722;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,87,34,0.5);
        }

        #lyric-container {
            width: 100%;
            height: 70vh;
            position: relative;
            overflow: hidden;
            display: none;
            mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
        }

        #lyric-list {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            transition: transform 0.15s linear; /* Transisi dipercepat */
        }

        .lyric-line {
            padding: 25px 10px;
            opacity: 0.15;
            transition: all 0.2s ease;
        }

        .hanzi { display: block; font-size: 2.6rem; font-weight: bold; }
        .latin { display: block; font-size: 1.1rem; opacity: 0.8; margin-top: 5px; }

        .active { opacity: 1 !important; transform: scale(1.1); color: #fff; text-shadow: 0 0 15px #fff; }
    </style>
</head>
<body>

    <div id="play-screen" onclick="initApp()">
        <button class="btn-start">MULAI KARAOKE</button>
    </div>

    <div id="lyric-container">
        <div id="lyric-list"></div>
    </div>

    <audio id="myAudio">
        <source src="2174439633541359863-c.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('myAudio');
        const playScreen = document.getElementById('play-screen');
        const lyricContainer = document.getElementById('lyric-container');
        const lyricList = document.getElementById('lyric-list');

        // WAKTU DIPERSIAPKAN LEBIH CEPAT (Sangat Presisi)
        const lyricData = [
            [0.0, "不需要太阳", "bù xū yào tài yáng"],
            [0.9, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [4.7, "妈妈说要快乐", "mā ma shuō yào kuài lè"],
            [7.9, "全没告诉我方法", "quán méi gào sù wǒ fāng fǎ"],
            [11.2, "成长的小鬼为我", "chéng zhǎng de xiǎo guǐ wéi wǒ"],
            [14.5, "时代是学不可怕", "shì dài shì xué bù kě pà"],
            [17.8, "可怕的是里还相信这句话", "kě pà de shì lǐ hái xiāng xìn zhè jù huà"],
            [22.1, "做自己的光", "zuò zì jǐ de guāng"],
            [25.6, "不需要太亮", "bù xū yào tài liàng"],
            [28.8, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [32.4, "孤独的路上", "gū dú de lù shàng"],
            [35.6, "还要走很长", "hái yào zǒu hěn cháng"],
            [38.9, "成长来自不曾放弃的每一步", "chéng zhǎng lái zì bù céng fàng qì de méi mù"],
            [43.8, "做自己的光", "zuò zì jǐ de guāng"]
        ];

        lyricData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.id = `line-${index}`;
            div.innerHTML = `<span class="hanzi">${item[1]}</span><span class="latin">${item[2]}</span>`;
            lyricList.appendChild(div);
        });

        function initApp() {
            playScreen.style.display = 'none';
            lyricContainer.style.display = 'block';
            audio.play();
        }

        audio.addEventListener('timeupdate', () => {
            const current = audio.currentTime;
            for (let i = 0; i < lyricData.length; i++) {
                if (current >= lyricData[i][0] && (!lyricData[i+1] || current < lyricData[i+1][0])) {
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                    const activeLine = document.getElementById(`line-${i}`);
                    if(activeLine) {
                        activeLine.classList.add('active');
                        const offset = -activeLine.offsetTop;
                        lyricList.style.transform = `translateY(${offset}px)`;
                    }
                }
            }
        });
    </script>
</body>
</html>
