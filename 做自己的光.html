<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke - 做自己的光</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(180deg, #1a2a6c, #b21f1f, #fdbb2d);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* TOMBOL PLAY BESAR DI TENGAH */
        #play-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Memastikan paling depan */
        }

        .btn-start {
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: #ff9800;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,152,0,0.6);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* AREA LIRIK */
        #lyric-container {
            width: 100%;
            height: 70vh;
            position: relative;
            overflow: hidden;
            display: none; /* Sembunyi sampai tombol ditekan */
            mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
        }

        #lyric-list {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            transition: transform 0.3s ease-out;
        }

        .lyric-line {
            padding: 20px 10px;
            opacity: 0.2;
            transition: all 0.4s ease;
        }

        .hanzi { display: block; font-size: 2.5rem; font-weight: bold; }
        .latin { display: block; font-size: 1.1rem; opacity: 0.8; margin-top: 5px; }

        .active { opacity: 1 !important; transform: scale(1.1); color: #fff; text-shadow: 0 0 15px #fff; }
    </style>
</head>
<body>

    <div id="play-screen">
        <button class="btn-start" onclick="initApp()">MULAI LAGU</button>
    </div>

    <h1 id="title" style="display:none; position:fixed; top:20px;">做自己的光</h1>

    <div id="lyric-container">
        <div id="lyric-list"></div>
    </div>

    <audio id="myAudio">
        <source src="2174439633541359863-c.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('myAudio');
        const playScreen = document.getElementById('play-screen');
        const lyricContainer = document.getElementById('lyric-container');
        const lyricList = document.getElementById('lyric-list');
        const title = document.getElementById('title');

        const lyricData = [
            [0.1, "不需要太阳", "bù xū yào tài yáng"],
            [2.2, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [6.1, "妈妈说要快乐", "mā ma shuō yào kuài lè"],
            [9.4, "全没告诉我方法", "quán méi gào sù wǒ fāng fǎ"],
            [12.8, "成长的小鬼为我", "chéng zhǎng de xiǎo guǐ wéi wǒ"],
            [16.1, "时代是学不可怕", "shì dài shì xué bù kě pà"],
            [19.5, "可怕的是里还相信这句话", "kě pà de shì lǐ hái xiāng xìn zhè jù huà"],
            [23.8, "做自己的光", "zuò zì jǐ de guāng"],
            [27.4, "不需要太亮", "bù xū yào tài liàng"],
            [30.6, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [34.3, "孤独的路上", "gū dú de lù shàng"],
            [37.6, "还要走很长", "hái yào zǒu hěn cháng"],
            [40.8, "成长来自不曾放弃的每一步", "chéng zhǎng lái zì bù céng fàng qì de méi mù"],
            [45.3, "做自己的光", "zuò zì jǐ de guāng"]
        ];

        // RENDER LIRIK KE LAYAR
        lyricData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.id = `line-${index}`;
            div.innerHTML = `<span class="hanzi">${item[1]}</span><span class="latin">${item[2]}</span>`;
            lyricList.appendChild(div);
        });

        // FUNGSI MULAI
        function initApp() {
            playScreen.style.display = 'none'; // Hilangkan tombol
            lyricContainer.style.display = 'block'; // Munculkan lirik
            title.style.display = 'block';
            audio.play(); // Putar musik
        }

        // UPDATE LIRIK BERDASARKAN WAKTU AUDIO
        audio.addEventListener('timeupdate', () => {
            const current = audio.currentTime;
            for (let i = 0; i < lyricData.length; i++) {
                if (current >= lyricData[i][0] && (!lyricData[i+1] || current < lyricData[i+1][0])) {
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                    const activeLine = document.getElementById(`line-${i}`);
                    if(activeLine) {
                        activeLine.classList.add('active');
                        const offset = -activeLine.offsetTop;
                        lyricList.style.transform = `translateY(${offset}px)`;
                    }
                }
            }
        });
    </script>
</body>
</html>
