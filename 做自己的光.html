<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Start Karaoke - 做自己的光</title>
    <style>
        body {
            margin: 0;
            background: #0f0c29; 
            background: linear-gradient(180deg, #24243e, #0f0c29);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            color: white;
        }

        #play-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .btn-start {
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: #6a11cb;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(106, 17, 203, 0.5);
        }

        #lyric-container {
            width: 100%;
            height: 80vh;
            position: relative;
            overflow: hidden;
            display: none;
            mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
        }

        #lyric-list {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            transition: transform 0.1s linear;
        }

        .lyric-line {
            padding: 25px 15px;
            opacity: 0.1;
            transition: all 0.1s ease;
        }

        .hanzi { display: block; font-size: 2.8rem; font-weight: bold; }
        .latin { display: block; font-size: 1.2rem; opacity: 0.7; margin-top: 8px; }

        .active { 
            opacity: 1 !important; 
            transform: scale(1.1); 
            color: #00f2fe; 
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.8); 
        }
    </style>
</head>
<body>

    <div id="play-screen" onclick="initApp()">
        <button class="btn-start">MULAI SEKARANG</button>
    </div>

    <div id="lyric-container">
        <div id="lyric-list"></div>
    </div>

    <audio id="myAudio">
        <source src="2174439633541359863-c.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('myAudio');
        const playScreen = document.getElementById('play-screen');
        const lyricContainer = document.getElementById('lyric-container');
        const lyricList = document.getElementById('lyric-list');

        // TIMING INSTAN (Detik 0 langsung lirik pertama)
        const lyricData = [
            [0.0, "枯树还没发芽", "kū shù hái méi fā yá"],
            [1.0, "就被逼着要开花", "jiù bèi bī zhe yào kāi huā"],
            [2.8, "妈妈说要快乐", "mā ma shuō yào kuài lè"],
            [4.5, "却没告诉我方法", "què méi gào sù wǒ fāng fǎ"],
            [6.5, "成长它教会我", "chéng zhǎng tā jiào huì wǒ"],
            [8.3, "失败其实不可怕", "shī bài qí shí bù kě pà"],
            [10.2, "可怕的是你还相信这句话", "kě pà de shì nǐ hái xiāng xìn zhè jù huà"],
            [13.8, "做自己的光不需要太亮", "zuò zì jǐ de guāng bù xū yào tài liàng"],
            [17.4, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [20.9, "孤独的路上还要走很长", "gū dú de lù shàng hái yào zǒu hěn cháng"],
            [24.4, "成长二字本来就没有偏方", "chéng zhǎng èr zì běn lái jiù méi yǒu piān fāng"],
            [29.5, "做自己的光", "zuò zì jǐ de guāng"]
        ];

        lyricData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.id = `line-${index}`;
            div.innerHTML = `<span class="hanzi">${item[1]}</span><span class="latin">${item[2]}</span>`;
            lyricList.appendChild(div);
        });

        function initApp() {
            playScreen.style.display = 'none';
            lyricContainer.style.display = 'block';
            audio.play();
        }

        audio.addEventListener('timeupdate', () => {
            const current = audio.currentTime;
            for (let i = 0; i < lyricData.length; i++) {
                if (current >= lyricData[i][0] && (!lyricData[i+1] || current < lyricData[i+1][0])) {
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                    const activeLine = document.getElementById(`line-${i}`);
                    if(activeLine) {
                        activeLine.classList.add('active');
                        const offset = -activeLine.offsetTop;
                        lyricList.style.transform = `translateY(${offset}px)`;
                    }
                }
            }
        });
    </script>
</body>
</html>
