<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pas Sync Karaoke - 做自己的光</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(180deg, #1a2a6c, #b21f1f, #fdbb2d);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            color: white;
        }

        #play-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .btn-start {
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: #ff9800;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,152,0,0.5);
        }

        #lyric-container {
            width: 100%;
            height: 75vh;
            position: relative;
            overflow: hidden;
            display: none;
            mask-image: linear-gradient(to bottom, transparent, black 40%, black 60%, transparent);
        }

        #lyric-list {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .lyric-line {
            padding: 25px 15px;
            opacity: 0.1;
            transition: all 0.3s ease;
        }

        .hanzi { display: block; font-size: 2.8rem; font-weight: bold; }
        .latin { display: block; font-size: 1.2rem; opacity: 0.8; margin-top: 8px; }

        .active { opacity: 1 !important; transform: scale(1.1); color: #fff; text-shadow: 0 0 15px #fff; }
    </style>
</head>
<body>

    <div id="play-screen" onclick="initApp()">
        <button class="btn-start">MULAI</button>
    </div>

    <div id="lyric-container">
        <div id="lyric-list"></div>
    </div>

    <audio id="myAudio">
        <source src="2174439633541359863-c.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('myAudio');
        const playScreen = document.getElementById('play-screen');
        const lyricContainer = document.getElementById('lyric-container');
        const lyricList = document.getElementById('lyric-list');

        // TIMING YANG SUDAH DIMUNDURKAN (Biar Teks Gak Balapan)
        const lyricData = [
            [0.2, "枯树还没发芽", "kū shù hái méi fā yá"],
            [1.5, "就被逼着要开花", "jiù bèi bī zhe yào kāi huā"],
            [3.7, "妈妈说要快乐", "mā ma shuō yào kuài lè"],
            [5.5, "却没告诉我方法", "què méi gào sù wǒ fāng fǎ"],
            [7.6, "成长它教会我", "chéng zhǎng tā jiào huì wǒ"],
            [9.4, "失败其实不可怕", "shī bài qí shí bù kě pà"],
            [11.5, "可怕的是你还相信这句话", "kě pà de shì nǐ hái xiāng xìn zhè jù huà"],
            [15.2, "做自己的光 不需要太亮", "zuò zì jǐ de guāng bù xū yào tài liàng"],
            [18.8, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [22.4, "孤独的路上 还要走很长", "gū dú de lù shàng hái yào zǒu hěn cháng"],
            [26.0, "成长二字本来就没有偏方", "chéng zhǎng èr zì běn lái jiù méi yǒu piān fāng"],
            [31.2, "做自己的光", "zuò zì jǐ de guāng"]
        ];

        lyricData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.id = `line-${index}`;
            div.innerHTML = `<span class="hanzi">${item[1]}</span><span class="latin">${item[2]}</span>`;
            lyricList.appendChild(div);
        });

        function initApp() {
            playScreen.style.display = 'none';
            lyricContainer.style.display = 'block';
            audio.play();
        }

        audio.addEventListener('timeupdate', () => {
            const current = audio.currentTime;
            for (let i = 0; i < lyricData.length; i++) {
                if (current >= lyricData[i][0] && (!lyricData[i+1] || current < lyricData[i+1][0])) {
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                    const activeLine = document.getElementById(`line-${i}`);
                    if(activeLine) {
                        activeLine.classList.add('active');
                        const offset = -activeLine.offsetTop;
                        lyricList.style.transform = `translateY(${offset}px)`;
                    }
                }
            }
        });
    </script>
</body>
</html>
