<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke Auto-Sync - 做自己的光</title>
    <style>
        body {
            margin: 0;
            background: #0f0c29; 
            background: linear-gradient(180deg, #24243e, #0f0c29);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            color: white;
        }

        #play-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .btn-start {
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: #6a11cb;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(106, 17, 203, 0.5);
        }

        #lyric-container {
            width: 100%;
            height: 70vh;
            position: relative;
            overflow: hidden;
            display: none;
            mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
        }

        #lyric-list {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            transition: transform 0.15s linear;
        }

        .lyric-line {
            padding: 30px 15px;
            opacity: 0.15;
            transition: all 0.15s ease;
        }

        .hanzi { display: block; font-size: 2.5rem; font-weight: bold; }
        .latin { display: block; font-size: 1.1rem; opacity: 0.7; margin-top: 8px; }

        .active { 
            opacity: 1 !important; 
            transform: scale(1.15); 
            color: #00f2fe; 
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.8); 
        }

        /* TOMBOL KALIBRASI (SYNC) */
        #sync-controls {
            display: none;
            position: fixed;
            bottom: 30px;
            width: 100%;
            text-align: center;
            z-index: 1000;
        }

        .sync-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .sync-btn:active { background: rgba(255, 255, 255, 0.4); }

        #sync-val {
            margin: 0 15px;
            font-size: 16px;
            font-weight: bold;
            display: inline-block;
            width: 80px;
        }
    </style>
</head>
<body>

    <div id="play-screen" onclick="initApp()">
        <button class="btn-start">MULAI KARAOKE</button>
    </div>

    <div id="lyric-container">
        <div id="lyric-list"></div>
    </div>

    <div id="sync-controls">
        <button class="sync-btn" onclick="adjustSync(-0.2)">⏪ Perlambat Teks</button>
        <span id="sync-val">Pas: 0.0s</span>
        <button class="sync-btn" onclick="adjustSync(0.2)">Percepat Teks ⏩</button>
    </div>

    <audio id="myAudio">
        <source src="2174439633541359863-c.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('myAudio');
        const playScreen = document.getElementById('play-screen');
        const lyricContainer = document.getElementById('lyric-container');
        const lyricList = document.getElementById('lyric-list');
        const syncControls = document.getElementById('sync-controls');
        const syncVal = document.getElementById('sync-val');

        let lyricOffset = 0; // Variabel untuk mengatur kecepatan teks

        // Saya kembalikan timing ke versi normal agar tidak terlalu ngebut di awal
        const lyricData = [
            [0.1, "枯树还没发芽", "kū shù hái méi fā yá"],
            [1.5, "就被逼着要开花", "jiù bèi bī zhe yào kāi huā"],
            [4.0, "妈妈说要快乐", "mā ma shuō yào kuài lè"],
            [6.0, "却没告诉我方法", "què méi gào sù wǒ fāng fǎ"],
            [8.5, "成长它教会我", "chéng zhǎng tā jiào huì wǒ"],
            [10.5, "失败其实不可怕", "shī bài qí shí bù kě pà"],
            [13.0, "可怕的是你还相信这句话", "kě pà de shì nǐ hái xiāng xìn zhè jù huà"],
            [16.5, "做自己的光不需要太亮", "zuò zì jǐ de guāng bù xū yào tài liàng"],
            [20.0, "谁说要逆风才算飞翔", "shéi shuō yào nì fēng cái suàn fēi xiáng"],
            [23.5, "孤独的路上还要走很长", "gū dú de lù shàng hái yào zǒu hěn cháng"],
            [27.0, "成长二字本来就没有偏方", "chéng zhǎng èr zì běn lái jiù méi yǒu piān fāng"],
            [32.0, "做自己的光", "zuò zì jǐ de guāng"]
        ];

        lyricData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'lyric-line';
            div.id = `line-${index}`;
            div.innerHTML = `<span class="hanzi">${item[1]}</span><span class="latin">${item[2]}</span>`;
            lyricList.appendChild(div);
        });

        function initApp() {
            playScreen.style.display = 'none';
            lyricContainer.style.display = 'block';
            syncControls.style.display = 'block'; // Tampilkan tombol kalibrasi
            audio.play();
        }

        // Fungsi saat tombol + atau - ditekan
        function adjustSync(value) {
            lyricOffset += value;
            let displayVal = lyricOffset.toFixed(1);
            if (lyricOffset > 0) {
                syncVal.innerText = "+" + displayVal + "s";
                syncVal.style.color = "#00f2fe";
            } else if (lyricOffset < 0) {
                syncVal.innerText = displayVal + "s";
                syncVal.style.color = "#ff5722";
            } else {
                syncVal.innerText = "Pas: 0.0s";
                syncVal.style.color = "white";
            }
        }

        audio.addEventListener('timeupdate', () => {
            // Waktu audio ditambah/dikurang sesuai settingan pengguna
            const current = audio.currentTime + lyricOffset; 
            
            for (let i = 0; i < lyricData.length; i++) {
                if (current >= lyricData[i][0] && (!lyricData[i+1] || current < lyricData[i+1][0])) {
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active'));
                    const activeLine = document.getElementById(`line-${i}`);
                    if(activeLine) {
                        activeLine.classList.add('active');
                        const offset = -activeLine.offsetTop;
                        lyricList.style.transform = `translateY(${offset}px)`;
                    }
                }
            }
        });
    </script>
</body>
</html>
